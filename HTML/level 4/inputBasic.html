<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form >
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter your name" required>
    <br> <br>
    <label for="email">Email:</label>
    <input type="email" id="email" value="@gmail.com">
    <br> <br>
     <label for="password">Password:</label >
     <input type="password" id="password" required> <br>
      <label for="age">Age:</label>
      <input type="number" id="age" min="0" max="120"> <br>
       <label for="color">Favorite Color:</label>
       <input type="color" id="color"> <br>
        <label for="date">Date of Birth:</label>
        <input type="date" id="date"> <br>
         <label for="file">Upload File:</label>
         <input type="file" id="file"> <br>
         <label for="range">Range:</label>
         <input type="range" id="range" min="0" max="100" value="50">
         <br>
         <label for="Button"> Button dabao</label>
         <input type="button" id="Button" value="Click Me">
         <br>
         <label >Gender:</label>
         <input type="radio" id="male" name="gender" value="male">
         <label for="male">Male</label>
         <input type="radio" id="female" name="gender" value="female">
         <label for="female">Female</label>
         <br>
         <input type="checkbox" id="subscribe" name="subscribe" value="yes">
         <label for="subscribe">Subscribe to newsletter</label> 
         <br>
         <label for="Apple">Apple</label>
         <input type="checkbox" id="Apple" name="fruits" value="apple">
         <label for="Banana">Banana</label>
         <input type="checkbox" id="Banana" name="fruits" value="banana">
         <label for="Orange">Orange</label>
         <input type="checkbox" id="Orange" name="fruits" value="orange"><br>
         <label for="country">Country:</label>
         <select id="country" name="country">
           <option value="usa">United States</option>
           <option value="canada">Canada</option>
           <option value="uk">United Kingdom</option>
         </select> <br> 
         <textarea rows="10" cols="10" placeholder="Input text here"> Default value</textarea>
          <hr>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
  
    <br>
  </form>
</body>
</html>
