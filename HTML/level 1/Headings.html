<!DOCTYPE html>
<html lang="en">
<head>
  <title>Headings</title>
</head>
<body>
  <!-- Headings are defined with the <h1> to <h6> tags. <h1> defines the most important heading, while <h6> defines the least important heading. -->
  <h1>Heading 1</h1>
  <h2>Heading 2</h2>
  <h3>Heading 3</h3>
  <h4>Heading 4</h4>
  <h5>Heading 5</h5>
  <h6>Heading 6</h6>
</body>
</html>
