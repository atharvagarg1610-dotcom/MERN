  <h1>Character References</h1>
  <p>Character references are used to display reserved characters in HTML. For example, the less than symbol (<) is a reserved character in HTML, so you can use the character reference &lt; to display it.</p>
  <p>Here are some common character references:</p>
  <p>&trade; &copy; &reg;</p>
  <p>&omega; &alpha; &beta; &gamma; &pi; &lambda;</p>
  <p>&nabla; &kappa; &deg; &delta;</p>
