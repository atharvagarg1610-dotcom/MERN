<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        h1 {
            color: red;
            background-color: yellow;
        }
        p {
            color: blue;
        }
    </style>
    <link rel="stylesheet" href="ext.css">
</head>
<body>
    <!-- By this we understand the priority of CSS inline styles over internal and external styles and the priority of internal styles over external styles. That is inline styles have the highest priority, followed by internal styles, and then external styles. -->
    <h1 style="color: darkblue;">heading 1</h1>
    <p style="color: darkgreen;">This is a paragraph.</p>
</body>
</html>
