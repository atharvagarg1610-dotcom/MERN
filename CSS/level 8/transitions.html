<!DOCTYPE html>
<html lang="en">
<head>
   <style>
    .btn {
        background-color: rgb(221, 110, 110);
        color: rgb(20, 14, 14);
        padding: 10px 20px;
        border: 2px solid black;
        border-radius: 5px  ;
        width: 150px;
        transition-property: all;
        transition-duration: 4s;
        transition-timing-function: ease-in-out;
         /* Apply transition to all properties with a duration of 4 seconds and ease-in-out timing function */
         transition-delay: 0.8s;

    }

    .btn:hover {
        background-color: rgb(29, 29, 200); 
        width: 190px;
        color: white;
        /* Change background color on hover */
        
    }
   </style>
    <title>Document</title>
</head>
<body>
    <button class="btn">Hover Me</button>
</body>
</html>
