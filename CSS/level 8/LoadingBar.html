<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .b{
            width: 90%;
            height: 25px;
            border: 2px solid black;
            background-color: lightgrey;
            border-radius: 20px;
            position: relative;
            left: 4%;
        }
        .c{
            height: 100%;
            width: 100%;
            background-color: rgb(5, 101, 133);
            border-radius: 20px;

            animation: load 3s 5;
        }
        @keyframes load {
            from {width: 0%;}
            to {width: 100%;}
            
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Loading Bar</h1>
    <div class="b">
        <div class="c"></div>
    </div>
    
</body>
</html>
